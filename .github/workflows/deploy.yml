name: Pipeline CI/CD - Innovatech Chile

on:
  push:
    branches:
      - deploy # Disparador oficial al subir cambios a la rama deploy

# ── CONFIGURACIÓN GLOBAL ──────────────────────────────────────────────────
env:
  REPO_DIR: "Prueba-Devops2" # Carpeta donde se clona tu repositorio en Linux

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      registry: ${{ steps.login-ecr.outputs.registry }}
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: us-east-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, Tag, and Push to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        # 1. Compilar y subir Microservicio de Ventas
        docker build -t $ECR_REGISTRY/innovatech-ventas:latest ./back-Ventas_SpringBoot/Springboot-API-REST
        docker push $ECR_REGISTRY/innovatech-ventas:latest
        
        # 2. Compilar y subir Microservicio de Despachos
        docker build -t $ECR_REGISTRY/innovatech-despachos:latest ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
        docker push $ECR_REGISTRY/innovatech-despachos:latest
        
        # 3. Compilar y subir Frontend Web (Nginx + React)
        docker build -t $ECR_REGISTRY/innovatech-frontend:latest ./front_despacho
        docker push $ECR_REGISTRY/innovatech-frontend:latest

  deploy-infrastructure:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
    # ── TRABAJO 1: DESPLIEGUE EN BACKEND PRIVADO VIA BASTION HOST ────────────────
    - name: Actualizar Instancia de Backend (APIs vía Proxy Frontend)
      uses: appleboy/ssh-action@v1.0.3
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
        REGISTRY: ${{ needs.build-and-push.outputs.registry }}
        FOLDER: ${{ env.REPO_DIR }}
      with:
        host: 10.0.2.107 # IP Privada de tu Backend
        username: ec2-user
        key: ${{ secrets.EC2_SSH_KEY }}
        proxy_host: ${{ secrets.EC2_HOST_FRONTEND }}
        proxy_username: ec2-user
        proxy_key: ${{ secrets.EC2_SSH_KEY }}
        envs: AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_SESSION_TOKEN,REGISTRY,FOLDER
        script: |
          # Entrar al repositorio para descargar el productos.sql actualizado
          cd /home/ec2-user/$FOLDER
          git pull origin deploy
          
          # Autenticarse en Amazon ECR
          export AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin $REGISTRY
          
          # Moverse a la ruta del docker-compose.yml manual del Backend y actualizar APIs
          cd /home/ec2-user
          docker compose pull
          docker compose up -d
          
          # INYECCIÓN AUTOMÁTICA DE PRODUCTOS A LA INSTANCIA DE BASE DE DATOS
          echo "==== Esperando 10 segundos a que la red interna se estabilice ===="
          sleep 10
          
          echo "==== Insertando catálogo de productos en la instancia de Data ===="
          # ⚠️ REEMPLAZA EL TEXTO 'TU_IP_PRIVADA_DE_LA_BASE_DE_DATOS' POR LA IP REAL (Ej: 10.0.2.X)
          docker run --rm -i mysql:8.0 mysql -h TU_IP_PRIVADA_DE_LA_BASE_DE_DATOS -u root -padmin123 < /home/ec2-user/$FOLDER/productos.sql
          
          echo "==== ¡Base de datos remota abastecida con éxito para la demo! ===="

    # ── TRABAJO 2: DESPLIEGUE DIRECTO EN EL FRONTEND PÚBLICO ──────────────────────
    - name: Actualizar Instancia de Frontend (Web Directo)
      uses: appleboy/ssh-action@v1.0.3
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
        REGISTRY: ${{ needs.build-and-push.outputs.registry }}
        FOLDER: ${{ env.REPO_DIR }}
      with:
        host: ${{ secrets.EC2_HOST_FRONTEND }}
        username: ec2-user
        key: ${{ secrets.EC2_SSH_KEY }}
        envs: AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_SESSION_TOKEN,REGISTRY,FOLDER
        script: |
          # Entrar al repositorio y actualizarlo
          cd /home/ec2-user/$FOLDER
          git pull origin deploy
          
          # Autenticarse en Amazon ECR
          export AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin $REGISTRY
          
          # Moverse a la ruta del docker-compose.yml manual del Frontend y actualizar Web
          cd /home/ec2-user
          docker compose pull
          docker compose up -d
          echo "==== ¡Frontend actualizado exitosamente! ===="