name: Pipeline Express - Actualizar Color Front

on:
  push:
    branches:
      - deploy
    paths:
      - 'front_despacho/**'

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
    - name: Conectar al Frontend y Actualizar la Página
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST_FRONTEND }}
        username: ec2-user
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          echo "==== Actualizando el diseño del Frontend ===="
          cd /home/ec2-user/Prueba-Devops2
          
          # 1. Bajar el cambio de texto desde GitHub
          git pull origin deploy
          
          # 2. Forzar la reconstrucción real apuntando al nombre del servicio en el compose
          sudo docker compose up -d --build --force-recreate api-frontend
          
          echo "==== ¡Texto actualizado con éxito en producción! ===="